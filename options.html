<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Visit Tracker - Options</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <p class="description">How long should the extension wait before showing you the "Welcome back" banner?</p>
        
        <div class="form-group">
            <label for="trackingMethod" style="display:block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #e2e8f0;">Tracking Method</label>
            <select id="trackingMethod" style="width: 100%; margin-bottom: 20px;">
                <option value="both" selected>Both Domain & Exact URL</option>
                <option value="domain">Only By Domain (e.g., example.com)</option>
                <option value="url">Only By Exact URL (e.g., example.com/page)</option>            
            </select>

            <label style="display:block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #e2e8f0;">Wait Duration</label>
            <div class="input-row">
                <input type="number" id="durationValue" min="1" value="1" required>
                <select id="durationUnit">
                    <option value="seconds">Seconds (Test)</option>
                    <option value="hours">Hours</option>
                    <option value="days" selected>Days</option>
                    <option value="weeks">Weeks</option>
                    <option value="months">Months</option>
                    <option value="years">Years</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button id="saveBtn" class="primary-btn">Save Settings</button>
            <span id="statusMessage" class="status-msg"></span>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
